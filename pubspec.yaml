name: flymap
description: "Offline maps for flights"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 2.0.2+28

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^4.0.0
  firebase_analytics: ^12.0.0
  firebase_crashlytics: ^5.0.0
  cloud_functions: ^6.0.0
  
  http: ^1.1.0
  geolocator: ^10.1.0
  latlong2: ^0.9.1
  maplibre_gl: 0.25.0
  
  path_provider: ^2.1.1

  get_it: ^7.6.7
  
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  go_router: ^14.2.7
  
  sembast: ^3.8.5+1
  path: ^1.8.3
  sqflite: ^2.3.2
  shared_preferences: ^2.2.3
  share_plus: ^10.0.2
  url_launcher: ^6.3.2
  csv: ^5.0.2
  flutter_markdown: ^0.7.4+3
  html: ^0.15.6
  webview_flutter: ^4.13.0
  flutter_svg: ^2.0.10+1
  purchases_flutter: ^9.15.1
  purchases_ui_flutter: ^9.15.1
  package_info_plus: ^8.3.0
  uuid: ^4.5.1
  slang: ^4.8.0
  slang_flutter: ^4.8.0
  country_flags: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  slang_build_runner: ^4.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/iata_airlines.csv # source: https://github.com/benct/iata-utils/blob/master/data/iata_airport_list.csv
    - assets/data/airports.csv # source: https://ourairports.com/data/ filtered by large and medium size in chatgpt
    - assets/data/learn/
    - assets/data/learn/articles/
    - assets/data/ne_50m_land.geojson
    - assets/styles/openfreemap_offline_style.json
    - assets/sprites/
    - assets/glyphs/Noto Sans Italic/
    - assets/glyphs/Noto Sans Regular/
    - assets/glyphs/Noto Sans Medium/
    - assets/glyphs/Noto Sans Bold/
    - assets/app_icon.png
    - assets/images/
    - assets/images/icons/
    - assets/images/learn/
    - assets/images/learn/categories/
    - assets/images/poi/
    - assets/images/regions/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/app_icon.png
  # Optional adaptive icon background color to match brand
  # adaptive_icon_background: "#0D234A"
